appId: com.cadence.app
productName: Cadence
copyright: "Copyright © 2026 Pavel Stepanov"

# Compiled Electron main/preload go here
files:
  - dist/**/*
  - package.json

# Bundle the Next.js standalone server + static assets into app resources.
# next build must be run with output: 'standalone' in next.config.ts first.
# Layout inside resources/:
#   next-server/           ← standalone server + its node_modules
#   next-server/public/    ← copied from root /public
#   next-server/.next/static/ ← copied from root /.next/static
extraResources:
  - from: "../.next/standalone"
    to: "next-server"
    filter: ["**/*"]
  - from: "../public"
    to: "next-server/public"
    filter: ["**/*"]
  - from: "../.next/static"
    to: "next-server/.next/static"
    filter: ["**/*"]
  # Learn catalog: Next dev reads repo supabase/; bundled server cwd is next-server/
  - from: "../supabase/modules.sql"
    to: "next-server/supabase/modules.sql"
  - from: "../src/backend/ai-engine"
    to: "desktop-runtime/ai-engine"
    filter:
      - "**/*"
      - "!**/.venv"
      - "!**/.venv/**"
      - "!**/.venv*/**"
      - "!**/__pycache__/**"
      - "!**/.pytest_cache/**"
      - "!**/*.pyc"
  - from: "../src/backend/coach-engine"
    to: "desktop-runtime/coach-engine"
    filter:
      - "**/*"
      - "!**/.venv"
      - "!**/.venv/**"
      - "!**/.venv*/**"
      - "!**/__pycache__/**"
      - "!**/.pytest_cache/**"
      - "!**/*.pyc"
  - from: "vendor/python/aarch64-apple-darwin"
    to: "desktop-runtime/python/aarch64-apple-darwin"
    filter: ["**/*"]
  - from: "vendor/python/x86_64-apple-darwin"
    to: "desktop-runtime/python/x86_64-apple-darwin"
    filter: ["**/*"]

directories:
  output: packages

mac:
  target:
    - target: dmg
      arch:
        - x64    # Intel
        - arm64  # Apple Silicon
  icon: assets/icon.icns
  category: public.app-category.education
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist

dmg:
  title: "Cadence ${version}"
  window:
    width: 540
    height: 380

# For future: Windows + Linux
